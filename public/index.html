<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Aplicación Markdown</h1>
    <hr>

    <h2>Archivos disponibles</h2>

    <button onclick="listaArchivos()">
        Listar archivos
    </button>

    <ul id="listaArchivos"></ul>
    <hr>

    <h2>Contenido del archivo</h2>
    <div id="contenido"></div>
    <hr>

    <h2>Crear nuevo archivo Markdown</h2>
    <input type="text" id="nombreArchivo" placeholder="Nombre del archivo">
    <br><br>

    <textArea
        id="contenidoArchivo"
        rows="10"
        cols="50"
        placeholder="Contenido markdown">
    </textArea>
    <br>

    <button onclick="crearArchivo()">
        Crear archivo
    </button>
    
</body>
</html>
